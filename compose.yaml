services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lan_share}
      POSTGRES_USER: ${POSTGRES_USER:-lan_share}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lan_share}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lan_share} -d ${POSTGRES_DB:-lan_share}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - ./data/minio:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://lan_share:lan_share@postgres:5432/lan_share?sslmode=disable}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-minio}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-lan-share}
      LOCAL_STORAGE_DIR: ${LOCAL_STORAGE_DIR:-/data/local-storage}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-lan-share-admin}
      AUTH_SECRET: ${AUTH_SECRET:-please-change-this-secret}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
    volumes:
      - ./data/local-storage:/data/local-storage
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "${API_HOST_PORT:-8080}:8080"

  web:
    build:
      context: ./apps/web
    depends_on:
      - api
    ports:
      - "${WEB_HOST_PORT:-4173}:80"
